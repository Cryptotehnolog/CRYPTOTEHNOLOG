# ==================== CRYPTOTEHNOLOG Prometheus Configuration ====================
# Metrics collection and storage configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cryptotechnolog-dev'
    environment: 'development'

# Alertmanager configuration (for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files for alerts
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # CRYPTOTEHNOLOG Python Service
  - job_name: 'cryptotechnolog-python'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis Exporter (if using)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # PostgreSQL Exporter (if using)
  - job_name: 'postgres'
    static_configs:
      - targets: ['timescaledb:5432']
    scrape_interval: 30s

  # Node Exporter (for system metrics, if using)
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
    scrape_interval: 15s

  # Rust Components (if exposing metrics)
  - job_name: 'rust-components'
    static_configs:
      - targets: ['host.docker.internal:9000']
    metrics_path: '/metrics'
    scrape_interval: 10s
