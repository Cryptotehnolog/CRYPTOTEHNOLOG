# ==================== CRYPTOTEHNOLOG Prometheus Alerts ====================
# Alert rules for monitoring the trading platform

groups:
  - name: system_alerts
    interval: 30s
    rules:
      # System health alerts
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is {{ $value }}% available on {{ $labels.instance }}."

  - name: trading_alerts
    interval: 30s
    rules:
      # Trading system alerts
      - alert: OrderFailureRateHigh
        expr: rate(order_failures_total[5m]) / rate(order_submissions_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High order failure rate"
          description: "Order failure rate is {{ $value | humanizePercentage }} on {{ $labels.exchange }}."

      - alert: PositionValueLossHigh
        expr: position_unrealized_pnl_usd < -1000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High unrealized loss on position"
          description: "Position {{ $labels.symbol }} on {{ $labels.exchange }} has unrealized loss of ${{ $value }}."

      - alert: RiskLimitViolation
        expr: risk_exposure_usd > risk_limit_usd
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Risk limit violation"
          description: "Risk exposure {{ $value }} exceeds limit on {{ $labels.exchange }}."

      - alert: ExchangeConnectionFailure
        expr: exchange_connection_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Exchange connection failure"
          description: "Cannot connect to {{ $labels.exchange }}."

      - alert: APIRateLimitExceeded
        expr: rate(api_requests_total[1m]) > api_rate_limit
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "API rate limit exceeded"
          description: "API request rate {{ $value }} exceeds limit on {{ $labels.exchange }}."

  - name: infrastructure_alerts
    interval: 30s
    rules:
      # Infrastructure alerts
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is down."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is down."

      - alert: PostgresConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool nearly exhausted"
          description: "PostgreSQL connection pool usage is {{ $value | humanizePercentage }}."

  - name: application_alerts
    interval: 30s
    rules:
      # Application-specific alerts
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.endpoint }}."

      - alert: SlowRequestRate
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow requests detected"
          description: "95th percentile request latency is {{ $value }}s for {{ $labels.endpoint }}."

      - alert: EventBusBacklog
        expr: event_bus_queue_length > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Event bus backlog detected"
          description: "Event bus queue length is {{ $value }}."

      - alert: StateMachineStuck
        expr: state_machine_last_transition_seconds > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "State machine appears stuck"
          description: "State machine has not transitioned in {{ $value }} seconds."
