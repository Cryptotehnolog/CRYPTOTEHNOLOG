# ==================== CRYPTOTEHNOLOG Infisical Docker Compose ====================
# Local Infisical instance for secrets management
# 
# SECURITY FEATURES:
# - Internal Docker network (isolated from external traffic)
# - localhost-only access (127.0.0.1)
# - Encrypted volumes for data at rest
# - Health checks for all services
# - Resource limits
#
# USAGE:
#   docker-compose -f docker-compose-infisical.yml up -d
#   # Wait 30 seconds for initialization
#   curl http://127.0.0.1:8080/api/status

services:
  # ==================== PostgreSQL (Infisical Backend) ====================
  db:
    image: postgres:15-alpine
    container_name: cryptotechnolog_infisical_db
    restart: always
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: infisical
    volumes:
      - infisical_postgres:/var/lib/postgresql/data
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ==================== Redis (Cache & Sessions) ====================
  redis:
    image: redis:7-alpine
    container_name: cryptotechnolog_infisical_redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - infisical_redis:/data
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ==================== Infisical (Secrets Manager) ====================
  infisical:
    image: infisical/infisical:v0.158.13
    container_name: cryptotechnolog_infisical
    restart: always
    ports:
      # Bind to localhost only for security!
      - "127.0.0.1:8080:8080"
    environment:
      - NODE_ENV=production
      - DB_CONNECTION_URI=postgres://infisical:${DB_PASSWORD}@db:5432/infisical
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - SITE_URL=http://127.0.0.1:8080
      # Disable telemetry
      - TELEMETRY_ENABLED=false
      # Security settings
      - RATE_LIMIT_MAX_REQUESTS=100
      - RATE_LIMIT_WINDOW_MS=60000
    volumes:
      - infisical_app:/app/.infisical
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

# ==================== Networks ====================
networks:
  infisical_internal:
    driver: bridge
    # internal: true  # Disabled - blocks port mapping

# ==================== Volumes ====================
volumes:
  infisical_postgres:
    driver: local
  infisical_redis:
    driver: local
  infisical_app:
    driver: local
