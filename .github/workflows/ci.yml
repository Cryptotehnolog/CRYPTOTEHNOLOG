# ==================== CRYPTOTEHNOLOG CI/CD Pipeline ====================
name: CI/CD Pipeline

on:
  push:
    branches: ["**"]  # Run on all branches
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==================== Python Tests ====================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: bot_user
          POSTGRES_PASSWORD: bot_password_dev
          POSTGRES_DB: trading_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          # Remove old version if exists (to avoid site-packages conflicts)
          uv pip uninstall cryptotechnolog --yes || true
          # Install in editable mode with force-reinstall
          uv pip install -e ".[dev]" --force-reinstall

      - name: Run linter (ruff)
        run: |
          # Check for undefined names (F821) and missing required imports (I002)
          .venv/bin/ruff check src/ tests/ --select F821,I002
          # Run full ruff check
          .venv/bin/ruff check src/ tests/
          # Check formatting
          .venv/bin/ruff format --check src/ tests/

      - name: Run type checker (mypy)
        run: |
          .venv/bin/mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: |
          .venv/bin/python -m pytest tests/unit/ -v -n auto --dist loadscope --cov=src --cov-report=xml
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost

      - name: Run integration tests
        run: |
          .venv/bin/python -m pytest tests/integration/ -v -m integration -n auto --dist loadscope --cov=src --cov-append --cov-report=xml
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          name: codecov-python-${{ matrix.python-version }}

  # ==================== Rust Tests ====================
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config python3.12-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and index
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            rust_components/target
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Remove stale cargo cache
        run: |
          rm -rf ~/.cargo/registry/src/*/cryptotechnolog-* || true
          rm -rf ~/.cargo/registry/index/github.com-*/cryptotechnolog-* || true

      - name: Run fmt check
        run: cargo fmt -- --check || true

      - name: Check audit-chain crate explicitly (debug)
        run: |
          cargo check --package cryptotechnolog-audit-chain --lib --verbose

      - name: Check workspace dependencies (early detection)
        run: |
          # Clean to ensure fresh build (avoid stale cache issues)
          cargo clean
          # Check lib targets for dependency issues (all-targets can be too strict)
          cargo check --workspace --lib

      - name: Build workspace
        run: cargo build --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        # Exclude ffi crate (requires Python C API linking - tested via Python pytest)
        run: cargo test --workspace --exclude cryptotechnolog-ffi --lib --quiet

  # ==================== Security Scan ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          # Remove old version if exists (to avoid site-packages conflicts)
          uv pip uninstall cryptotechnolog --yes || true
          # Install in editable mode with force-reinstall
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install detect-secrets bandit[toml] safety

      - name: Run detect-secrets
        run: |
          if [ -f .secrets.baseline ]; then
            .venv/bin/detect-secrets scan --baseline .secrets.baseline || true
          else
            .venv/bin/detect-secrets scan || true
          fi
        continue-on-error: true

      - name: Run Bandit
        run: |
          .venv/bin/bandit -r src/ -f json -o bandit-report.json || true
          .venv/bin/bandit -r src/ -f screen || true

      - name: Run Safety
        run: |
          .venv/bin/safety check -r requirements.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json

  # ==================== Dependency Check ====================
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          # Remove old version if exists (to avoid site-packages conflicts)
          uv pip uninstall cryptotechnolog --yes || true
          # Install in editable mode with force-reinstall
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install pip-audit safety

      - name: Run pip-audit
        run: |
          .venv/bin/pip-audit -r requirements.txt || true

      - name: Run safety
        run: |
          .venv/bin/safety check -r requirements.txt || true

  # ==================== Docker Build Test ====================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t cryptotechnolog:test .

      - name: Test Docker image
        run: |
          docker run --rm cryptotechnolog:test python --version
          docker run --rm cryptotechnolog:test pip list | grep pydantic

  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          # Remove old version if exists (to avoid site-packages conflicts)
          uv pip uninstall cryptotechnolog --yes || true
          # Install in editable mode with force-reinstall
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install radon

      - name: Check code complexity (radon)
        run: |
          .venv/bin/radon cc src/ -a -nb

      - name: Check code duplication (jscpd)
        run: |
          npm install -g jscpd
          jscpd src/ --format python --min-tokens 50 --reporters console || true

  # ==================== Summary ====================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-python, test-rust, security-scan, dependency-check, docker-build, code-quality]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Pipeline Complete!"
          echo "===================="
          echo "Python Tests: ${{ needs.test-python.result }}"
          echo "Rust Tests: ${{ needs.test-rust.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"

      - name: Fail if any job failed
        if: |
          needs.test-python.result == 'failure' ||
          needs.test-rust.result == 'failure' ||
          needs.security-scan.result == 'failure' ||
          needs.dependency-check.result == 'failure' ||
          needs.docker-build.result == 'failure' ||
          needs.code-quality.result == 'failure'
        run: exit 1
