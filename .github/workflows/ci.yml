name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Rust and knowledge checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust workspace
        run: cargo check

      - name: Test Rust workspace
        run: cargo test

      - name: Check knowledge base
        shell: pwsh
        run: .\scripts\kb_health_check.ps1

      - name: Check local Markdown links
        shell: pwsh
        run: .\scripts\validate_local_links.ps1

      - name: Check knowledge freshness warnings
        shell: pwsh
        run: .\scripts\kb_stale_check.ps1

      - name: Check repository compliance
        shell: pwsh
        run: .\scripts\check_compliance.ps1

      - name: Check Phase gate
        shell: pwsh
        run: .\scripts\check_phase_gate.ps1

      - name: Check replay manifest
        shell: pwsh
        run: .\scripts\check_replay_manifest.ps1

      - name: Check ingestion manifest
        shell: pwsh
        run: .\scripts\check_ingestion_manifest.ps1

      - name: Check Phase 0 pipeline manifest
        shell: pwsh
        run: .\scripts\check_phase0_pipeline_manifest.ps1

      - name: Check fixture paths
        shell: pwsh
        run: .\scripts\check_fixture_paths.ps1

      - name: Check pricing model fixture policy
        shell: pwsh
        run: .\scripts\check_pricing_model_fixture_update.ps1

      - name: Check manual JSON writers
        shell: pwsh
        run: .\scripts\check_manual_json_writers.ps1

      - name: Check midpoint false-positive report
        shell: pwsh
        run: .\scripts\check_midpoint_false_positive_report.ps1

      - name: Run replay regression
        shell: pwsh
        run: .\scripts\run_replay_regression.ps1

      - name: Run ingestion regression
        shell: pwsh
        run: .\scripts\run_ingestion_regression.ps1

      - name: Run Phase 0 pipeline regression
        shell: pwsh
        run: .\scripts\run_phase0_pipeline_regression.ps1

      - name: Check golden fixture freshness
        shell: pwsh
        run: .\scripts\check_golden_fixture_current.ps1

      - name: Check ingestion golden report freshness
        shell: pwsh
        run: .\scripts\check_ingestion_golden_current.ps1

      - name: Check Phase 0 pipeline golden report freshness
        shell: pwsh
        run: .\scripts\check_phase0_pipeline_golden_current.ps1
