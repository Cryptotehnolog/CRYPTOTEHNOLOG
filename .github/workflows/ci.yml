# ==================== CRYPTOTEHNOLOG CI/CD Pipeline ====================
name: CI/CD Pipeline

on:
  push:
    branches: ["**"]  # Run on all branches
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==================== Python Tests ====================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: bot_user
          POSTGRES_PASSWORD: bot_password_dev
          POSTGRES_DB: trading_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall

      - name: Create test database and apply migrations
        run: |
          .venv/bin/python -c "
          import asyncio
          import asyncpg
          from pathlib import Path

          async def create_test_db_and_migrate():
              # Connect to postgres to create database
              conn = await asyncpg.connect(
                  host='localhost',
                  port=5432,
                  user='bot_user',
                  password='bot_password_dev',
                  database='postgres'
              )
              
              # Drop existing test database if exists
              await conn.execute(\"\"\"
                  SELECT pg_terminate_backend(pg_stat_activity.pid)
                  FROM pg_stat_activity
                  WHERE pg_stat_activity.datname = 'trading_test'
                  AND pid <> pg_backend_pid()
              \"\"\")
              await conn.execute('DROP DATABASE IF EXISTS trading_test')
              await conn.execute('CREATE DATABASE trading_test OWNER bot_user')
              print('Created fresh trading_test database')
              await conn.close()

              # Connect to trading_test and create tables
              conn = await asyncpg.connect(
                  host='localhost',
                  port=5432,
                  user='bot_user',
                  password='bot_password_dev',
                  database='trading_test'
              )

              # Apply migrations as whole files (not split by semicolon!)
              migrations_dir = Path('scripts/migrations')
              migration_files = [
                  '001_initial_schema.sql',
                  '002_risk_tables.sql', 
                  '003_trading_tables.sql',
                  '004_event_bus_tables.sql',
                  '005_backup_recovery.sql',
                  '006_monitoring_alerts.sql',
                  '007_add_status_columns.sql',
                  'control_plane_additions.sql',
                  '008_fix_risk_event_types.sql',
                  '009_add_indexes.sql',
              ]

              for filename in migration_files:
                  filepath = migrations_dir / filename
                  if not filepath.exists():
                      print(f'Skipping {filename} (not found)')
                      continue
                  print(f'Applying {filename}...')
                  sql = filepath.read_text(encoding='utf-8')
                  try:
                      await conn.execute(sql)
                  except Exception as e:
                      # Ignore some expected errors for idempotency
                      if 'already exists' not in str(e).lower() and 'duplicate' not in str(e).lower():
                          print(f'Warning: {e}')
                  print(f'Completed {filename}')

              print('Applied all migrations to trading_test')
              await conn.close()

          asyncio.run(create_test_db_and_migrate())
          "

      - name: Run linter (ruff)
        run: |
          .venv/bin/ruff check src/ tests/ --select F821,I002
          .venv/bin/ruff check src/ tests/
          .venv/bin/ruff format --check src/ tests/

      - name: Run type checker (mypy)
        run: |
          .venv/bin/mypy -m cryptotechnolog \
            -m cryptotechnolog.core \
            -m cryptotechnolog.backtest \
            -m cryptotechnolog.data \
            -m cryptotechnolog.config \
            -m cryptotechnolog.risk \
            -m cryptotechnolog.analysis \
            -m cryptotechnolog.execution \
            -m cryptotechnolog.intelligence \
            -m cryptotechnolog.models \
            -m cryptotechnolog.observability \
            -m cryptotechnolog.strategy
        continue-on-error: true

      - name: Run unit tests (without DB - parallel with retry)
        run: .venv/bin/python -m pytest tests/unit/ -v -m "not db" -n auto --dist loadscope --cov=src --cov-report=xml --reruns 3 --reruns-delay 1
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost

      - name: Run unit tests (with DB - sequential with retry)
        run: .venv/bin/python -m pytest tests/unit/ -v -m db -n 0 --cov=src --cov-report=xml --reruns 3 --reruns-delay 1
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost

      - name: Run integration tests (sequential with retry)
        run: .venv/bin/python -m pytest tests/integration/ -v -n 0 --cov=src --cov-append --cov-report=xml --reruns 3 --reruns-delay 1
        env:
          REDIS_HOST: localhost
          POSTGRES_HOST: localhost

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          name: codecov-python-${{ matrix.python-version }}

  # ==================== Rust Tests ====================
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean old directories
        run: |
          rm -rf rust_components 2>/dev/null || true
          rm -rf target 2>/dev/null || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config python3.12-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Clean cargo cache
        run: |
          cargo clean
          rm -rf target

      - name: Cache cargo registry and index
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        id: cache-build
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Build local dependencies first
        run: |
          cargo build --package cryptotechnolog-audit-chain --lib --all-features
          cargo build --package cryptotechnolog-common --lib --all-features

      - name: Run fmt check
        run: cargo fmt -- --check || true

      - name: Check workspace
        run: cargo check --workspace --lib --all-features

      - name: Build workspace
        run: cargo build --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude cryptotechnolog-ffi --lib --quiet

  # ==================== Rust Property-Based Tests ====================
  test-rust-property:
    name: Rust Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and index
        if: success()
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        if: success()
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-prop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prop-

      - name: Run property-based tests (risk-ledger)
        run: cargo test -p cryptotechnolog-risk-ledger --test property_merkle --test property_validation -- --nocapture

      - name: Run property-based tests (execution-core)
        run: cargo test -p cryptotechnolog-execution-core --test property_order_matching --test property_risk_calculation -- --nocapture

  # ==================== Security Scan ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install detect-secrets bandit[toml] safety

      - name: Run detect-secrets
        run: |
          if [ -f .secrets.baseline ]; then
            .venv/bin/detect-secrets scan --baseline .secrets.baseline || true
          else
            .venv/bin/detect-secrets scan || true
          fi
        continue-on-error: true

      - name: Run Bandit
        run: |
          .venv/bin/bandit -r src/ -f json -o bandit-report.json || true
          .venv/bin/bandit -r src/ -f screen || true

      - name: Run Safety
        run: .venv/bin/safety check -r requirements.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # ==================== Dependency Check ====================
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install pip-audit safety

      - name: Run pip-audit
        run: .venv/bin/pip-audit -r requirements.txt || true

      - name: Run safety
        run: .venv/bin/safety check -r requirements.txt || true

  # ==================== Docker Build Test ====================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t cryptotechnolog:test .

      - name: Test Docker image
        run: |
          docker run --rm cryptotechnolog:test python --version
          docker run --rm cryptotechnolog:test pip list | grep pydantic

  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install radon

      - name: Check code complexity (radon)
        run: .venv/bin/radon cc src/ -a -nb

      - name: Check code duplication (jscpd)
        run: |
          npm install -g jscpd
          jscpd src/ --format python --min-tokens 50 --reporters console || true

  # ==================== Summary ====================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-python, test-rust, test-rust-property, security-scan, dependency-check, docker-build, code-quality]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Pipeline Complete!"
          echo "===================="
          echo "Python Tests: ${{ needs.test-python.result }}"
          echo "Rust Tests: ${{ needs.test-rust.result }}"
          echo "Rust Property-Based Tests: ${{ needs.test-rust-property.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"

      - name: Fail if any job failed
        if: |
          needs.test-python.result == 'failure' ||
          needs.test-rust.result == 'failure' ||
          needs.test-rust-property.result == 'failure' ||
          needs.security-scan.result == 'failure' ||
          needs.dependency-check.result == 'failure' ||
          needs.docker-build.result == 'failure' ||
          needs.code-quality.result == 'failure'
        run: exit 1
