            --ignore=tests/unit/test_drawdown_monitor.py \
            --ignore=tests/unit/test_execution_runtime.py \
            --ignore=tests/unit/test_funding_manager.py \
            --ignore=tests/unit/test_intelligence_runtime_boundary.py \
            --ignore=tests/unit/test_live_feed_runtime.py \
            --ignore=tests/unit/test_live_feed_integration.py \
            --ignore=tests/unit/test_live_feed_bybit_connector.py \
            --ignore=tests/unit/test_manager_runtime.py \
            --ignore=tests/unit/test_market_data_runtime.py \
            --ignore=tests/unit/test_operator_gate.py \
            --ignore=tests/unit/test_oms_runtime.py \
            --ignore=tests/unit/test_opportunity_runtime.py \
            --ignore=tests/unit/test_orchestration_runtime.py \
            --ignore=tests/unit/test_paper_runtime.py \
            --ignore=tests/unit/test_portfolio_governor_runtime.py \
            --ignore=tests/unit/test_position_expansion_runtime.py \
            --ignore=tests/unit/test_protection_runtime.py \
            --ignore=tests/unit/test_risk_engine.py \
            --ignore=tests/unit/test_risk_engine_event_integration.py \
            --ignore=tests/unit/test_risk_engine_persistence_integration.py \
            --ignore=tests/unit/test_risk_ledger.py \
            --ignore=tests/unit/test_risk_persistence.py \
            --ignore=tests/unit/test_risk_runtime.py \
            --ignore=tests/unit/test_signal_runtime.py \
            --ignore=tests/unit/test_strategy_runtime.py \
            --ignore=tests/unit/test_validation_runtime.py \
            --ignore=tests/unit/test_watchdog.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: python-unit-other-light
          name: codecov-python-unit-other-light

  # ==================== Rust Tests ====================
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clean old directories
        run: |
          rm -rf rust_components 2>/dev/null || true
          rm -rf target 2>/dev/null || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config python3.12-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Clean cargo cache
        run: |
          cargo clean
          rm -rf target

      - name: Cache cargo registry and index
        if: success()
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        id: cache-build
        if: success()
        uses: actions/cache@v5
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Build local dependencies first
        run: |
          cargo build --package cryptotechnolog-audit-chain --lib --all-features
          cargo build --package cryptotechnolog-common --lib --all-features

      - name: Run fmt check
        run: cargo fmt -- --check || true

      - name: Check workspace
        run: cargo check --workspace --lib --all-features

      - name: Build workspace
        run: cargo build --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude cryptotechnolog-ffi --lib --quiet

  # ==================== Rust Property-Based Tests ====================
  test-rust-property:
    name: Rust Property-Based Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and index
        if: success()
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo build
        if: success()
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-prop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-prop-

      - name: Run property-based tests (risk-ledger)
        run: cargo test -p cryptotechnolog-risk-ledger --test property_merkle --test property_validation -- --nocapture

      - name: Run property-based tests (execution-core)
        run: cargo test -p cryptotechnolog-execution-core --test property_order_matching --test property_risk_calculation -- --nocapture

  # ==================== Security Scan ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Verify uv
        run: uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install detect-secrets bandit[toml] safety

      - name: Run detect-secrets
        run: |
          if [ -f .secrets.baseline ]; then
            .venv/bin/detect-secrets scan --baseline .secrets.baseline
          else
            echo ".secrets.baseline is required for blocking detect-secrets gate"
            exit 1
          fi

      - name: Run Bandit
        run: |
          .venv/bin/bandit -r src/ -f json -o bandit-report.json || true
          .venv/bin/bandit -r src/ -f screen || true

      - name: Run Safety
        run: .venv/bin/safety check -r requirements.txt || true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # ==================== Dependency Check ====================
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Verify uv
        run: uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install pip-audit safety

      - name: Run pip-audit
        run: .venv/bin/pip-audit -r requirements.txt

      - name: Run safety
        run: .venv/bin/safety check -r requirements.txt

  # ==================== Docker Build Test ====================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t cryptotechnolog:test .

      - name: Test Docker image
        run: |
          docker run --rm cryptotechnolog:test python --version
          docker run --rm cryptotechnolog:test pip list | grep pydantic

  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Verify uv
        run: uv --version

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall
          uv pip install radon

      - name: Check code complexity (radon)
        run: .venv/bin/radon cc src/ -a -nb

      - name: Check code duplication (jscpd)
        run: |
          npm install -g jscpd
          jscpd src/ --format python --min-tokens 50 --reporters console || true

  # ==================== Summary ====================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - test-python-checks
      - test-python-unit-db
      - test-python-integration-infra
      - test-python-integration-control-plane
      - test-python-integration-bootstrap
      - test-python-integration-rust-components
      - test-python-integration-event-bus-load
      - test-python-unit-heavy
      - test-python-unit-runtime-remainder
      - test-python-unit-redis
      - test-python-unit-runtime-replay-live-feed
      - test-python-unit-risk-engine-core
      - test-python-unit-risk-runtime-guards
      - test-python-unit-risk-engine-persistence
      - test-python-unit-risk-ledger-persistence
      - test-python-unit-other-runtime-domain
      - test-python-unit-other-light
      - test-rust
      - test-rust-property
      - security-scan
      - dependency-check
      - docker-build
      - code-quality
    if: always()

    steps:
      - name: Check results
        run: |
          echo "CI Pipeline Complete!"
          echo "===================="
          echo "Python Tests: ${{ needs.test-python.result }}"
          echo "Rust Tests: ${{ needs.test-rust.result }}"
          echo "Rust Property-Based Tests: ${{ needs.test-rust-property.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Check: ${{ needs.dependency-check.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"

      - name: Fail if any job failed
        if: |
          needs.test-python.result == 'failure' ||
          needs.test-rust.result == 'failure' ||
          needs.test-rust-property.result == 'failure' ||
          needs.security-scan.result == 'failure' ||
          needs.dependency-check.result == 'failure' ||
          needs.docker-build.result == 'failure' ||
          needs.code-quality.result == 'failure'
        run: exit 1
