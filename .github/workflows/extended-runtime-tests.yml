name: Extended Runtime Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.10.9"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-python-integration-bootstrap:
    name: Python Integration Tests - Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REDIS_HOST: localhost
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password_dev
      POSTGRES_DB: trading_dev
      POSTGRES_TEST_DB: trading_test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall

      - name: Create test database and apply migrations
        run: |
          .venv/bin/python - <<'PY'
          import asyncio
          import asyncpg
          import os
          from pathlib import Path

          async def create_test_db_and_migrate():
              conn = await asyncpg.connect(
                  host=os.environ['POSTGRES_HOST'],
                  port=int(os.environ['POSTGRES_PORT']),
                  user=os.environ['POSTGRES_USER'],
                  password=os.environ['POSTGRES_PASSWORD'],
                  database='postgres'
              )
              await conn.execute("""
                  SELECT pg_terminate_backend(pg_stat_activity.pid)
                  FROM pg_stat_activity
                  WHERE pg_stat_activity.datname = $1
                  AND pid <> pg_backend_pid()
              """, os.environ['POSTGRES_TEST_DB'])
              await conn.execute(
                  f"DROP DATABASE IF EXISTS {os.environ['POSTGRES_TEST_DB']}"
              )
              await conn.execute(
                  f"CREATE DATABASE {os.environ['POSTGRES_TEST_DB']} OWNER {os.environ['POSTGRES_USER']}"
              )
              await conn.close()

              conn = await asyncpg.connect(
                  host=os.environ['POSTGRES_HOST'],
                  port=int(os.environ['POSTGRES_PORT']),
                  user=os.environ['POSTGRES_USER'],
                  password=os.environ['POSTGRES_PASSWORD'],
                  database=os.environ['POSTGRES_TEST_DB']
              )

              migrations_dir = Path('scripts/migrations')
              migration_files = [
                  '001_initial_schema.sql',
                  '002_risk_tables.sql',
                  '003_trading_tables.sql',
                  '004_event_bus_tables.sql',
                  '005_backup_recovery.sql',
                  '006_monitoring_alerts.sql',
                  '007_add_status_columns.sql',
                  'control_plane_additions.sql',
                  '008_fix_risk_event_types.sql',
                  '009_add_indexes.sql',
              ]

              for filename in migration_files:
                  filepath = migrations_dir / filename
                  if not filepath.exists():
                      continue
                  sql = filepath.read_text(encoding='utf-8')
                  try:
                      await conn.execute(sql)
                  except Exception as e:
                      if 'already exists' not in str(e).lower() and 'duplicate' not in str(e).lower():
                          print(f'Warning: {e}')
              await conn.close()

          asyncio.run(create_test_db_and_migrate())
          PY

      - name: Run integration tests (bootstrap)
        run: |
          .venv/bin/python -m pytest \
            tests/integration/test_bootstrap_integration.py \
            -v -n 0 --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: extended-runtime-bootstrap
          name: codecov-extended-runtime-bootstrap

  test-python-unit-risk-engine-core:
    name: Python Unit Tests - Risk Engine Core
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]" --force-reinstall

      - name: Run unit tests (without DB - risk engine core)
        run: |
          .venv/bin/python -m pytest \
            tests/unit/test_risk_engine.py \
            tests/unit/test_risk_engine_event_integration.py \
            -v -m "not db" -n 0 --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: extended-runtime-risk-engine-core
          name: codecov-extended-runtime-risk-engine-core

