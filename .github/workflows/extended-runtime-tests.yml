  test-python-unit-risk-engine-persistence:
    name: Python Unit Tests - Risk Engine Persistence
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
