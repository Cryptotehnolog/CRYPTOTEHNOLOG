name: Network integration

on:
  workflow_dispatch:

jobs:
  connectivity:
    name: Read-only connectivity check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check Deribit and Polymarket connectivity
        shell: pwsh
        run: .\scripts\run_network_connectivity_check.ps1 -Timestamped

      - name: Run live probe replay
        if: always()
        shell: pwsh
        run: .\scripts\run_live_probe_replay.ps1 -Timestamped

      - name: Summarize live probe replay reports
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path artifacts/live_probe_replay_report*.json) {
            .\scripts\summarize_live_probe_replay_reports.ps1 | Tee-Object -FilePath artifacts/live_probe_replay_trend_summary.txt
          } else {
            "No live probe replay reports found." | Set-Content -Path artifacts/live_probe_replay_trend_summary.txt
          }

      - name: Build Phase 0 daily report
        if: always()
        shell: pwsh
        run: .\scripts\run_phase0_daily_report.ps1 -Timestamped

      - name: Upload connectivity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-connectivity-report
          path: artifacts/network_connectivity_report*.json
          if-no-files-found: warn

      - name: Upload live probe replay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-probe-replay-report
          path: |
            artifacts/live_probe_replay_report*.json
            artifacts/live_probe_replay_trend_summary.txt
          if-no-files-found: warn

      - name: Upload Phase 0 daily report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase0-daily-report
          path: |
            artifacts/phase0_daily_report*.json
            artifacts/phase0_daily_report*.md
          if-no-files-found: warn
