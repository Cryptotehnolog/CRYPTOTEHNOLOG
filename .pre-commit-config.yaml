# ==================== CRYPTOTEHNOLOG Pre-commit Hooks ====================
# Run before each commit to ensure code quality

# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # ==================== General ====================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: "^docs/"
      - id: end-of-file-fixer
        exclude: "^docs/"
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ==================== Python ====================
  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      # Check for undefined names and missing imports (early detection)
      - id: ruff
        args: [--select, F821,I002]

      # Run full ruff check with auto-fix
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
          - types-redis
          - types-requests
        args: [--ignore-missing-imports]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # ==================== Type Stubs Check ====================
  - repo: local
    hooks:
      # Check .pyi files for missing imports
      - id: check-pyi-imports
        name: Check .pyi imports
        entry: bash -c 'python -m ruff check src/ --select F821 --include "*.pyi"'
        language: system
        pass_filenames: false
        files: src/.*\.pyi$

  # ==================== Security ====================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # ==================== Rust ====================
  - repo: local
    hooks:
      # Check workspace dependencies (early detection)
      - id: cargo-check-workspace
        name: cargo check workspace
        entry: bash -c 'cd crates && cargo check --workspace --all-targets'
        language: system
        pass_filenames: false
        files: crates/.*\.rs$|crates/Cargo\.toml$

      # Format Rust code
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd crates && cargo fmt -- --check'
        language: system
        pass_filenames: false
        files: crates/.*\.rs$

      # Run clippy
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd crates && cargo clippy --workspace -- -D warnings'
        language: system
        pass_filenames: false
        files: crates/.*\.rs$|crates/Cargo\.toml$

  # ==================== Docker ====================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008"]

  # ==================== Markdown ====================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # ==================== Shell ====================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck

# ==================== CI Configuration ====================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
