# ==================== Observability Secrets ====================
- folder: observability
  secrets:
    - name: LOG_LEVEL
      description: Уровень логирования (DEBUG/INFO/WARNING/ERROR/CRITICAL)
      required: true
      default: INFO
      environment: all

    - name: LOG_FORMAT
      description: Формат логов (JSON/TEXT)
      required: true
      default: JSON
      environment: all

    - name: METRICS_ENABLED
      description: Включить метрики (true/false)
      required: true
      default: "true"
      environment: all

    - name: PROMETHEUS_PORT
      description: Порт Prometheus
      required: true
      default: "9090"
      environment: all

    - name: DASHBOARD_ENABLED
      description: Включить веб-дашборд (true/false)
      required: true
      default: "true"
      environment: all

    - name: DASHBOARD_HOST
      description: Хост дашборда
      required: true
      default: 0.0.0.0
      environment: all

    - name: DASHBOARD_PORT
      description: Порт дашборда
      required: true
      default: "8000"
      environment: all

# ==================== Security Secrets ====================
- folder: security
  secrets:
    - name: INFISICAL_TOKEN
      description: Infisical Service Token
      required: true
      default: ""
      environment: all

    - name: INFISICAL_PROJECT_ID
      description: Infisical Project ID
      required: true
      default: ""
      environment: all

    - name: INFISICAL_ENVIRONMENT
      description: Infisical Environment (dev/prod)
      required: true
      default: dev
      environment: all

    - name: VAULT_ADDR
      description: HashiCorp Vault адрес (если используется)
      required: false
      default: http://localhost:8200
      environment: all

    - name: VAULT_TOKEN
      description: HashiCorp Vault токен (если используется)
      required: false
      default: dev-only-token
      environment: dev

