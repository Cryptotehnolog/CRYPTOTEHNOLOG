# ==================== Trading Secrets ====================
- folder: trading
  secrets:
    - name: BASE_R_PERCENT
      description: Базовый риск в процентах (0.01 = 1%)
      required: true
      default: "0.01"
      environment: all

    - name: MAX_R_PER_TRADE
      description: Максимальный риск на сделку (USD)
      required: true
      default: "1.0"
      environment: all

    - name: MAX_PORTFOLIO_R
      description: Максимальный риск портфеля (USD)
      required: true
      default: "5.0"
      environment: all

    - name: MAX_POSITION_SIZE
      description: Максимальный размер позиции (USD)
      required: true
      default: "10000.0"
      environment: all

    - name: DEFAULT_LEVERAGE
      description: Плечо по умолчанию
      required: true
      default: "1.0"
      environment: all

    - name: MAX_LEVERAGE
      description: Максимальное плечо
      required: true
      default: "10.0"
      environment: all

    - name: SLIPPAGE_TOLERANCE
      description: Допустимый проскальзывание (0.001 = 0.1%)
      required: true
      default: "0.001"
      environment: all

    - name: ORDER_TIMEOUT
      description: Таймаут ордера (секунды)
      required: true
      default: "30"
      environment: all

# ==================== Environment Secrets ====================
- folder: environment
  secrets:
    - name: ENVIRONMENT
      description: Окружение (development/production)
      required: true
      default: development
      environment: all

    - name: DEBUG
      description: Debug режим (true/false)
      required: true
      default: "true"
      environment: dev

    - name: TIMEZONE
      description: Часовой пояс
      required: true
      default: UTC
      environment: all

    - name: CURRENCY
      description: Базовая валюта
      required: true
      default: USD
      environment: all
