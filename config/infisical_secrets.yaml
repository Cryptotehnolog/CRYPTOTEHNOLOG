# ==================== CRYPTOTEHNOLOG Infisical Secrets Configuration ====================
# Полный список секретов для хранения в Infisical
#
# Использование:
# 1. Создайте папки в Infisical согласно структуре ниже
# 2. Добавьте секреты в соответствующие папки
# 3. Запустите scripts/load_secrets_from_infisical.py для загрузки в .env
#
# Формат:
# - folder: путь к папке в Infisical
#   secrets:
#     - name: имя секрета
#       description: описание
#       required: обязательно ли (true/false)
#       default: значение по умолчанию (для dev)
#       environment: где используется (dev/prod/all)

# ==================== Database Secrets ====================
- folder: database
  secrets:
    - name: POSTGRES_HOST
      description: PostgreSQL хост
      required: true
      default: localhost
      environment: all

    - name: POSTGRES_PORT
      description: PostgreSQL порт
      required: true
      default: "5432"
      environment: all

    - name: POSTGRES_USER
      description: PostgreSQL пользователь
      required: true
      default: bot_user
      environment: all

    - name: POSTGRES_PASSWORD
      description: PostgreSQL пароль
      required: true
      default: bot_password_dev
      environment: all

    - name: POSTGRES_DB
      description: PostgreSQL база данных
      required: true
      default: trading_dev
      environment: all

    - name: REDIS_HOST
      description: Redis хост
      required: true
      default: localhost
      environment: all

    - name: REDIS_PORT
      description: Redis порт
      required: true
      default: "6379"
      environment: all

    - name: REDIS_DB
      description: Redis база данных
      required: true
      default: "0"
      environment: all

    - name: REDIS_PASSWORD
      description: Redis пароль (опционально)
      required: false
      default: ""
      environment: all

